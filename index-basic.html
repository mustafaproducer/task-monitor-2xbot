<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vazifalar Monitoring Tizimi</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const STATUSES = {
            PENDING: 'Kutilmoqda',
            IN_PROGRESS: 'Jarayonda',
            COMPLETED: 'Bajarildi',
            BLOCKED: "To'silgan"
        };
        
        const STATUS_COLORS = {
            'Kutilmoqda': 'bg-blue-100 text-blue-800 border-blue-300',
            'Jarayonda': 'bg-yellow-100 text-yellow-800 border-yellow-300',
            'Bajarildi': 'bg-green-100 text-green-800 border-green-300',
            "To'silgan": 'bg-red-100 text-red-800 border-red-300'
        };
        
        const STATUS_BADGE_COLORS = {
            'Kutilmoqda': 'bg-blue-500',
            'Jarayonda': 'bg-yellow-500',
            'Bajarildi': 'bg-green-500',
            "To'silgan": 'bg-red-500'
        };
        
        function TaskMonitor() {
            const [tasks, setTasks] = useState([]);
            const [newTaskTitle, setNewTaskTitle] = useState('');
            const [filter, setFilter] = useState('Hammasi');
            
            // localStorage dan yuklab olish
            useEffect(() => {
                const savedTasks = localStorage.getItem('tasks');
                if (savedTasks) {
                    setTasks(JSON.parse(savedTasks));
                }
            }, []);
            
            // localStorage ga saqlash
            useEffect(() => {
                localStorage.setItem('tasks', JSON.stringify(tasks));
            }, [tasks]);
            
            const addTask = () => {
                if (newTaskTitle.trim()) {
                    const newTask = {
                        id: Date.now(),
                        title: newTaskTitle,
                        status: STATUSES.PENDING,
                        createdAt: new Date().toISOString()
                    };
                    setTasks([...tasks, newTask]);
                    setNewTaskTitle('');
                }
            };
            
            const deleteTask = (id) => {
                setTasks(tasks.filter(task => task.id !== id));
            };
            
            const updateTaskStatus = (id, newStatus) => {
                setTasks(tasks.map(task => 
                    task.id === id ? { ...task, status: newStatus } : task
                ));
            };
            
            const getStats = () => {
                return {
                    total: tasks.length,
                    pending: tasks.filter(t => t.status === STATUSES.PENDING).length,
                    inProgress: tasks.filter(t => t.status === STATUSES.IN_PROGRESS).length,
                    completed: tasks.filter(t => t.status === STATUSES.COMPLETED).length,
                    blocked: tasks.filter(t => t.status === STATUSES.BLOCKED).length
                };
            };
            
            const filteredTasks = filter === 'Hammasi' 
                ? tasks 
                : tasks.filter(task => task.status === filter);
            
            const stats = getStats();
            
            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        {/* Header */}
                        <div className="mb-8">
                            <h1 className="text-3xl md:text-4xl font-bold text-gray-800 mb-2">
                                📋 Vazifalar Monitoring Tizimi
                            </h1>
                            <p className="text-gray-600">
                                Vazifalaringizni kuzating va boshqaring
                            </p>
                        </div>
                        
                        {/* Statistics */}
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
                            <div className="bg-white rounded-lg shadow p-4 border-l-4 border-gray-500">
                                <div className="text-sm text-gray-600">Jami</div>
                                <div className="text-2xl font-bold text-gray-800">{stats.total}</div>
                            </div>
                            <div className="bg-white rounded-lg shadow p-4 border-l-4 border-blue-500">
                                <div className="text-sm text-blue-600">Kutilmoqda</div>
                                <div className="text-2xl font-bold text-blue-800">{stats.pending}</div>
                            </div>
                            <div className="bg-white rounded-lg shadow p-4 border-l-4 border-yellow-500">
                                <div className="text-sm text-yellow-600">Jarayonda</div>
                                <div className="text-2xl font-bold text-yellow-800">{stats.inProgress}</div>
                            </div>
                            <div className="bg-white rounded-lg shadow p-4 border-l-4 border-green-500">
                                <div className="text-sm text-green-600">Bajarildi</div>
                                <div className="text-2xl font-bold text-green-800">{stats.completed}</div>
                            </div>
                            <div className="bg-white rounded-lg shadow p-4 border-l-4 border-red-500">
                                <div className="text-sm text-red-600">To'silgan</div>
                                <div className="text-2xl font-bold text-red-800">{stats.blocked}</div>
                            </div>
                        </div>
                        
                        {/* Add Task */}
                        <div className="bg-white rounded-lg shadow-md p-6 mb-6">
                            <div className="flex gap-2 flex-col md:flex-row">
                                <input
                                    type="text"
                                    value={newTaskTitle}
                                    onChange={(e) => setNewTaskTitle(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && addTask()}
                                    placeholder="Yangi vazifa kiriting..."
                                    className="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                />
                                <button
                                    onClick={addTask}
                                    className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium flex items-center justify-center gap-2"
                                >
                                    <span>➕</span>
                                    <span>Qo'shish</span>
                                </button>
                            </div>
                        </div>
                        
                        {/* Filter */}
                        <div className="bg-white rounded-lg shadow-md p-4 mb-6">
                            <div className="flex gap-2 flex-wrap">
                                <button
                                    onClick={() => setFilter('Hammasi')}
                                    className={`px-4 py-2 rounded-lg font-medium transition ${
                                        filter === 'Hammasi'
                                            ? 'bg-gray-800 text-white'
                                            : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                    }`}
                                >
                                    Hammasi ({stats.total})
                                </button>
                                {Object.values(STATUSES).map(status => (
                                    <button
                                        key={status}
                                        onClick={() => setFilter(status)}
                                        className={`px-4 py-2 rounded-lg font-medium transition ${
                                            filter === status
                                                ? STATUS_BADGE_COLORS[status] + ' text-white'
                                                : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                        }`}
                                    >
                                        {status} ({tasks.filter(t => t.status === status).length})
                                    </button>
                                ))}
                            </div>
                        </div>
                        
                        {/* Tasks List */}
                        <div className="space-y-3">
                            {filteredTasks.length === 0 ? (
                                <div className="bg-white rounded-lg shadow-md p-12 text-center">
                                    <div className="text-6xl mb-4">📝</div>
                                    <p className="text-gray-500 text-lg">
                                        {filter === 'Hammasi' 
                                            ? 'Hozircha vazifalar yo\'q. Yuqoridan yangi vazifa qo\'shing!'
                                            : `"${filter}" statusida vazifa yo'q`}
                                    </p>
                                </div>
                            ) : (
                                filteredTasks.map(task => (
                                    <div
                                        key={task.id}
                                        className={`bg-white rounded-lg shadow-md p-4 border-l-4 ${
                                            STATUS_COLORS[task.status]
                                        } transition hover:shadow-lg`}
                                    >
                                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                            <div className="flex-1">
                                                <h3 className="font-medium text-gray-800 text-lg mb-2">
                                                    {task.title}
                                                </h3>
                                                <div className="text-sm text-gray-500">
                                                    📅 {new Date(task.createdAt).toLocaleDateString('uz-UZ')} {new Date(task.createdAt).toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' })}
                                                </div>
                                            </div>
                                            <div className="flex gap-2 items-center flex-wrap">
                                                <select
                                                    value={task.status}
                                                    onChange={(e) => updateTaskStatus(task.id, e.target.value)}
                                                    className={`px-3 py-2 rounded-lg font-medium border-2 cursor-pointer ${STATUS_COLORS[task.status]}`}
                                                >
                                                    {Object.values(STATUSES).map(status => (
                                                        <option key={status} value={status}>
                                                            {status}
                                                        </option>
                                                    ))}
                                                </select>
                                                <button
                                                    onClick={() => deleteTask(task.id)}
                                                    className="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition font-medium"
                                                    title="O'chirish"
                                                >
                                                    🗑️
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TaskMonitor />);
    </script>
</body>
</html>
