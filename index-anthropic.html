<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#191918">
    <title>Vazifalar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #FAFAF9;
            color: #191918;
            line-height: 1.6;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        
        /* Typography */
        h1 {
            font-size: 48px;
            font-weight: 700;
            color: #191918;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }
        
        h2 {
            font-size: 24px;
            font-weight: 600;
            color: #191918;
            margin-bottom: 24px;
            letter-spacing: -0.01em;
        }
        
        h3 {
            font-size: 18px;
            font-weight: 600;
            color: #191918;
            margin-bottom: 8px;
        }
        
        p {
            font-size: 16px;
            color: #6B6B6B;
            line-height: 1.6;
        }
        
        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate {
            animation: fadeInUp 0.6s ease-out;
        }
        
        /* Header */
        .header {
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 1px solid #E5E5E5;
        }
        
        .subtitle {
            font-size: 18px;
            color: #6B6B6B;
            font-weight: 400;
        }
        
        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-primary {
            background: #D97757;
            color: white;
        }
        
        .btn-primary:hover {
            background: #C86647;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(217, 119, 87, 0.25);
        }
        
        .btn-secondary {
            background: white;
            color: #191918;
            border: 1px solid #E5E5E5;
        }
        
        .btn-secondary:hover {
            background: #F5F5F5;
            border-color: #D0D0D0;
        }
        
        .btn-secondary.active {
            background: #191918;
            color: white;
            border-color: #191918;
        }
        
        .btn-delete {
            background: #191918;
            color: white;
        }
        
        .btn-delete:hover {
            background: #000000;
        }
        
        /* Card */
        .card {
            background: white;
            border: 1px solid #E5E5E5;
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
            transition: all 0.3s ease;
        }
        
        .card:hover {
            border-color: #D97757;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }
        
        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: white;
            border: 1px solid #E5E5E5;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            transition: all 0.2s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }
        
        .stat-number {
            font-size: 40px;
            font-weight: 700;
            color: #191918;
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-size: 14px;
            color: #6B6B6B;
            font-weight: 500;
        }
        
        /* Progress */
        .progress-section {
            background: white;
            border: 1px solid #E5E5E5;
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 40px;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .progress-bar-container {
            background: #F5F5F5;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #D97757 0%, #C86647 100%);
            transition: width 0.5s ease;
        }
        
        /* Form */
        .form-section {
            background: white;
            border: 1px solid #E5E5E5;
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 40px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        input, select {
            padding: 12px 16px;
            border: 1px solid #E5E5E5;
            border-radius: 6px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: #191918;
            transition: all 0.2s ease;
            background: white;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #D97757;
            box-shadow: 0 0 0 3px rgba(217, 119, 87, 0.1);
        }
        
        input::placeholder {
            color: #B0B0B0;
        }
        
        /* Filters */
        .filters {
            background: white;
            border: 1px solid #E5E5E5;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
        }
        
        .filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        
        .filter-label {
            font-size: 14px;
            font-weight: 600;
            color: #191918;
            margin-right: 8px;
            display: flex;
            align-items: center;
        }
        
        /* Task Card */
        .task-card {
            background: white;
            border: 1px solid #E5E5E5;
            border-left: 4px solid #E5E5E5;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
            cursor: grab;
        }
        
        .task-card:hover {
            border-left-color: #D97757;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
            transform: translateX(4px);
        }
        
        .task-card:active {
            cursor: grabbing;
        }
        
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }
        
        .task-content {
            flex: 1;
        }
        
        .task-title {
            font-size: 18px;
            font-weight: 600;
            color: #191918;
            margin-bottom: 12px;
        }
        
        .task-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .task-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            background: #F5F5F5;
            color: #6B6B6B;
        }
        
        .task-badge.priority-high {
            background: #FFF5F0;
            color: #D97757;
        }
        
        .task-badge.overdue {
            background: #191918;
            color: white;
        }
        
        .task-actions {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }
        
        /* Status borders */
        .status-pending {
            border-left-color: #D97757;
        }
        
        .status-progress {
            border-left-color: #FFCC00;
        }
        
        .status-completed {
            border-left-color: #6B6B6B;
        }
        
        .status-blocked {
            border-left-color: #191918;
        }
        
        /* Drop Zones */
        .drop-zones {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }
        
        .drop-zone {
            background: white;
            border: 2px dashed #E5E5E5;
            border-radius: 8px;
            padding: 32px 20px;
            text-align: center;
            transition: all 0.2s ease;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .drop-zone:hover {
            border-color: #D97757;
            background: #FFFBFA;
        }
        
        .drop-zone.drag-over {
            border-color: #D97757;
            background: #FFF5F0;
            border-style: solid;
        }
        
        .drop-zone-label {
            font-size: 14px;
            font-weight: 600;
            color: #6B6B6B;
            margin-bottom: 8px;
        }
        
        .drop-zone-count {
            font-size: 32px;
            font-weight: 700;
            color: #191918;
        }
        
        /* Empty State */
        .empty-state {
            background: white;
            border: 1px solid #E5E5E5;
            border-radius: 12px;
            padding: 80px 40px;
            text-align: center;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
        
        .empty-text {
            font-size: 18px;
            color: #6B6B6B;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }
            
            .stats,
            .drop-zones,
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .filter-group {
                flex-direction: column;
            }
            
            .task-header {
                flex-direction: column;
            }
            
            .task-actions {
                width: 100%;
            }
            
            select {
                width: 100%;
            }
        }
        
        /* Utilities */
        .mb-1 { margin-bottom: 8px; }
        .mb-2 { margin-bottom: 16px; }
        .mb-3 { margin-bottom: 24px; }
        .w-full { width: 100%; }
        .flex { display: flex; }
        .gap-2 { gap: 8px; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const STATUSES = {
            PENDING: 'Kutilmoqda',
            IN_PROGRESS: 'Jarayonda',
            COMPLETED: 'Bajarildi',
            BLOCKED: "To'silgan"
        };
        
        const PRIORITIES = {
            LOW: 'Past',
            MEDIUM: "O'rta",
            HIGH: 'Yuqori'
        };
        
        function TaskMonitor() {
            const [tasks, setTasks] = useState([]);
            const [newTaskTitle, setNewTaskTitle] = useState('');
            const [newTaskDeadline, setNewTaskDeadline] = useState('');
            const [newTaskPriority, setNewTaskPriority] = useState(PRIORITIES.MEDIUM);
            const [filter, setFilter] = useState('Hammasi');
            const [searchQuery, setSearchQuery] = useState('');
            const [draggedTask, setDraggedTask] = useState(null);
            
            useEffect(() => {
                const savedTasks = localStorage.getItem('tasks-anthropic');
                if (savedTasks) {
                    setTasks(JSON.parse(savedTasks));
                }
            }, []);
            
            useEffect(() => {
                localStorage.setItem('tasks-anthropic', JSON.stringify(tasks));
            }, [tasks]);
            
            const addTask = () => {
                if (newTaskTitle.trim()) {
                    const newTask = {
                        id: Date.now(),
                        title: newTaskTitle,
                        status: STATUSES.PENDING,
                        priority: newTaskPriority,
                        deadline: newTaskDeadline || null,
                        createdAt: new Date().toISOString()
                    };
                    setTasks([...tasks, newTask]);
                    setNewTaskTitle('');
                    setNewTaskDeadline('');
                    setNewTaskPriority(PRIORITIES.MEDIUM);
                }
            };
            
            const deleteTask = (id) => {
                setTasks(tasks.filter(task => task.id !== id));
            };
            
            const updateTaskStatus = (id, newStatus) => {
                setTasks(tasks.map(task => 
                    task.id === id ? { ...task, status: newStatus } : task
                ));
            };
            
            const handleDragStart = (e, task) => {
                setDraggedTask(task);
            };
            
            const handleDragOver = (e) => {
                e.preventDefault();
            };
            
            const handleDrop = (e, newStatus) => {
                e.preventDefault();
                if (draggedTask) {
                    updateTaskStatus(draggedTask.id, newStatus);
                    setDraggedTask(null);
                }
                e.currentTarget.classList.remove('drag-over');
            };
            
            const handleDragEnter = (e) => {
                e.currentTarget.classList.add('drag-over');
            };
            
            const handleDragLeave = (e) => {
                e.currentTarget.classList.remove('drag-over');
            };
            
            const exportTasks = () => {
                const dataStr = JSON.stringify(tasks, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `vazifalar-${new Date().toISOString().split('T')[0]}.json`;
                link.click();
            };
            
            const getStats = () => {
                return {
                    total: tasks.length,
                    pending: tasks.filter(t => t.status === STATUSES.PENDING).length,
                    inProgress: tasks.filter(t => t.status === STATUSES.IN_PROGRESS).length,
                    completed: tasks.filter(t => t.status === STATUSES.COMPLETED).length
                };
            };
            
            const getProgress = () => {
                const total = tasks.length;
                const completed = tasks.filter(t => t.status === STATUSES.COMPLETED).length;
                return total > 0 ? Math.round((completed / total) * 100) : 0;
            };
            
            const getStatusClass = (status) => {
                switch(status) {
                    case STATUSES.PENDING: return 'status-pending';
                    case STATUSES.IN_PROGRESS: return 'status-progress';
                    case STATUSES.COMPLETED: return 'status-completed';
                    case STATUSES.BLOCKED: return 'status-blocked';
                    default: return '';
                }
            };
            
            const filteredTasks = tasks.filter(task => {
                const statusMatch = filter === 'Hammasi' || task.status === filter;
                const searchMatch = task.title.toLowerCase().includes(searchQuery.toLowerCase());
                return statusMatch && searchMatch;
            });
            
            const stats = getStats();
            const progress = getProgress();
            
            return (
                <div className="container">
                    {/* Header */}
                    <div className="header animate">
                        <h1>Vazifalar</h1>
                        <p className="subtitle">Zamonaviy vazifalar boshqaruv tizimi</p>
                    </div>
                    
                    {/* Stats */}
                    <div className="stats animate">
                        <div className="stat-card">
                            <div className="stat-number">{stats.pending}</div>
                            <div className="stat-label">Kutilmoqda</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-number">{stats.inProgress}</div>
                            <div className="stat-label">Jarayonda</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-number">{stats.completed}</div>
                            <div className="stat-label">Bajarildi</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-number">{stats.total}</div>
                            <div className="stat-label">Jami</div>
                        </div>
                    </div>
                    
                    {/* Progress */}
                    <div className="progress-section animate">
                        <div className="progress-header">
                            <h2>Progress</h2>
                            <span style={{fontSize: '28px', fontWeight: 700}}>{progress}%</span>
                        </div>
                        <div className="progress-bar-container">
                            <div className="progress-bar" style={{width: `${progress}%`}} />
                        </div>
                    </div>
                    
                    {/* Add Task Form */}
                    <div className="form-section animate">
                        <h2>Yangi vazifa</h2>
                        <div className="form-grid">
                            <input
                                type="text"
                                value={newTaskTitle}
                                onChange={(e) => setNewTaskTitle(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && addTask()}
                                placeholder="Vazifa nomi..."
                            />
                            <input
                                type="datetime-local"
                                value={newTaskDeadline}
                                onChange={(e) => setNewTaskDeadline(e.target.value)}
                            />
                            <select
                                value={newTaskPriority}
                                onChange={(e) => setNewTaskPriority(e.target.value)}
                            >
                                {Object.values(PRIORITIES).map(priority => (
                                    <option key={priority} value={priority}>{priority}</option>
                                ))}
                            </select>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={addTask} className="btn btn-primary">
                                Vazifa qo'shish
                            </button>
                            <button onClick={exportTasks} className="btn btn-secondary">
                                Export
                            </button>
                        </div>
                    </div>
                    
                    {/* Filters */}
                    <div className="filters animate">
                        <input
                            type="text"
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                            placeholder="Qidirish..."
                            className="w-full mb-2"
                        />
                        <div className="filter-group">
                            <span className="filter-label">Status:</span>
                            <button
                                onClick={() => setFilter('Hammasi')}
                                className={`btn btn-secondary ${filter === 'Hammasi' ? 'active' : ''}`}
                            >
                                Hammasi
                            </button>
                            {Object.values(STATUSES).map(status => (
                                <button
                                    key={status}
                                    onClick={() => setFilter(status)}
                                    className={`btn btn-secondary ${filter === status ? 'active' : ''}`}
                                >
                                    {status}
                                </button>
                            ))}
                        </div>
                    </div>
                    
                    {/* Drop Zones */}
                    <div className="drop-zones animate">
                        {Object.values(STATUSES).map(status => (
                            <div
                                key={status}
                                onDragOver={handleDragOver}
                                onDrop={(e) => handleDrop(e, status)}
                                onDragEnter={handleDragEnter}
                                onDragLeave={handleDragLeave}
                                className="drop-zone"
                            >
                                <div className="drop-zone-label">{status}</div>
                                <div className="drop-zone-count">
                                    {tasks.filter(t => t.status === status).length}
                                </div>
                            </div>
                        ))}
                    </div>
                    
                    {/* Tasks List */}
                    <div className="animate">
                        {filteredTasks.length === 0 ? (
                            <div className="empty-state">
                                <div className="empty-icon">📋</div>
                                <p className="empty-text">Vazifalar topilmadi</p>
                            </div>
                        ) : (
                            filteredTasks.sort((a, b) => {
                                const priorityOrder = { 'Yuqori': 3, "O'rta": 2, 'Past': 1 };
                                return priorityOrder[b.priority] - priorityOrder[a.priority];
                            }).map(task => {
                                const isOverdue = task.deadline && new Date(task.deadline) < new Date() && task.status !== STATUSES.COMPLETED;
                                return (
                                    <div
                                        key={task.id}
                                        draggable
                                        onDragStart={(e) => handleDragStart(e, task)}
                                        className={`task-card ${getStatusClass(task.status)}`}
                                    >
                                        <div className="task-header">
                                            <div className="task-content">
                                                <h3 className="task-title">{task.title}</h3>
                                                <div className="task-meta">
                                                    <span className={`task-badge ${task.priority === 'Yuqori' ? 'priority-high' : ''}`}>
                                                        {task.priority}
                                                    </span>
                                                    <span className="task-badge">
                                                        {new Date(task.createdAt).toLocaleDateString('uz-UZ')}
                                                    </span>
                                                    {task.deadline && (
                                                        <span className={`task-badge ${isOverdue ? 'overdue' : ''}`}>
                                                            {new Date(task.deadline).toLocaleString('uz-UZ', {
                                                                day: '2-digit',
                                                                month: '2-digit',
                                                                hour: '2-digit',
                                                                minute: '2-digit'
                                                            })}
                                                            {isOverdue && ' (Kechikkan)'}
                                                        </span>
                                                    )}
                                                </div>
                                            </div>
                                            <div className="task-actions">
                                                <select
                                                    value={task.status}
                                                    onChange={(e) => updateTaskStatus(task.id, e.target.value)}
                                                >
                                                    {Object.values(STATUSES).map(status => (
                                                        <option key={status} value={status}>{status}</option>
                                                    ))}
                                                </select>
                                                <button
                                                    onClick={() => deleteTask(task.id)}
                                                    className="btn btn-delete"
                                                >
                                                    ×
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })
                        )}
                    </div>
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TaskMonitor />);
    </script>
</body>
</html>
