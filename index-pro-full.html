<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3b82f6">
    <link rel="manifest" href="manifest.json">
    <title>Vazifalar Pro - Monitoring Tizimi</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .task-card {
            animation: slideIn 0.3s ease-out;
        }
        .stat-card {
            animation: fadeIn 0.5s ease-out;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .task-card:hover {
            transform: translateX(4px);
        }
        .dark-mode {
            background: #1a202c;
            color: #e2e8f0;
        }
        .dark-mode .bg-white {
            background: #2d3748 !important;
        }
        .dark-mode .text-gray-800 {
            color: #e2e8f0 !important;
        }
        .dark-mode .text-gray-600 {
            color: #a0aec0 !important;
        }
        .dark-mode .text-gray-500 {
            color: #718096 !important;
        }
        .dark-mode .border-gray-300 {
            border-color: #4a5568 !important;
        }
        .dark-mode .bg-gray-50 {
            background: #1a202c !important;
        }
        .dark-mode .bg-gray-100 {
            background: #2d3748 !important;
        }
        .dragging {
            opacity: 0.5;
        }
        .drag-over {
            border: 2px dashed #3b82f6;
        }
        .notification {
            animation: slideIn 0.3s ease-out;
        }
        .progress-bar {
            transition: width 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-gray-50 transition-colors duration-300">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const STATUSES = {
            PENDING: 'Kutilmoqda',
            IN_PROGRESS: 'Jarayonda',
            COMPLETED: 'Bajarildi',
            BLOCKED: "To'silgan"
        };
        
        const PRIORITIES = {
            LOW: 'Past',
            MEDIUM: "O'rta",
            HIGH: 'Yuqori',
            URGENT: 'Juda muhim'
        };
        
        const PRIORITY_COLORS = {
            'Past': 'bg-gray-100 text-gray-600',
            "O'rta": 'bg-blue-100 text-blue-600',
            'Yuqori': 'bg-orange-100 text-orange-600',
            'Juda muhim': 'bg-red-100 text-red-600'
        };
        
        const STATUS_COLORS = {
            'Kutilmoqda': 'bg-blue-100 text-blue-800 border-blue-300',
            'Jarayonda': 'bg-yellow-100 text-yellow-800 border-yellow-300',
            'Bajarildi': 'bg-green-100 text-green-800 border-green-300',
            "To'silgan": 'bg-red-100 text-red-800 border-red-300'
        };
        
        const STATUS_BADGE_COLORS = {
            'Kutilmoqda': 'bg-blue-500',
            'Jarayonda': 'bg-yellow-500',
            'Bajarildi': 'bg-green-500',
            "To'silgan": 'bg-red-500'
        };
        
        const CATEGORIES = ['Ish', 'Shaxsiy', 'O\'quv', 'Sog\'liq', 'Boshqa'];
        
        function TaskMonitorPro() {
            const [tasks, setTasks] = useState([]);
            const [newTaskTitle, setNewTaskTitle] = useState('');
            const [newTaskDeadline, setNewTaskDeadline] = useState('');
            const [newTaskPriority, setNewTaskPriority] = useState(PRIORITIES.MEDIUM);
            const [newTaskCategory, setNewTaskCategory] = useState('Boshqa');
            const [filter, setFilter] = useState('Hammasi');
            const [categoryFilter, setCategoryFilter] = useState('Hammasi');
            const [searchQuery, setSearchQuery] = useState('');
            const [darkMode, setDarkMode] = useState(false);
            const [notification, setNotification] = useState(null);
            const [draggedTask, setDraggedTask] = useState(null);
            
            useEffect(() => {
                const savedTasks = localStorage.getItem('tasks-pro');
                if (savedTasks) {
                    setTasks(JSON.parse(savedTasks));
                }
                const savedDarkMode = localStorage.getItem('dark-mode');
                if (savedDarkMode === 'true') {
                    setDarkMode(true);
                    document.body.classList.add('dark-mode');
                }
                
                // Check deadlines every minute
                const interval = setInterval(checkDeadlines, 60000);
                checkDeadlines();
                
                return () => clearInterval(interval);
            }, []);
            
            useEffect(() => {
                localStorage.setItem('tasks-pro', JSON.stringify(tasks));
            }, [tasks]);
            
            useEffect(() => {
                localStorage.setItem('dark-mode', darkMode);
                if (darkMode) {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            }, [darkMode]);
            
            const checkDeadlines = () => {
                const now = new Date();
                tasks.forEach(task => {
                    if (task.deadline && task.status !== STATUSES.COMPLETED) {
                        const deadline = new Date(task.deadline);
                        const hoursUntil = (deadline - now) / (1000 * 60 * 60);
                        
                        if (hoursUntil > 0 && hoursUntil <= 24) {
                            showNotification(`⚠️ "${task.title}" - Deadline yaqinlashmoqda!`, 'warning');
                        } else if (hoursUntil <= 0) {
                            showNotification(`🔴 "${task.title}" - Deadline o'tdi!`, 'error');
                        }
                    }
                });
            };
            
            const showNotification = (message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 3000);
                
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification('Vazifalar Pro', { body: message });
                }
            };
            
            const requestNotificationPermission = () => {
                if ('Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission();
                }
            };
            
            const addTask = () => {
                if (newTaskTitle.trim()) {
                    const newTask = {
                        id: Date.now(),
                        title: newTaskTitle,
                        status: STATUSES.PENDING,
                        priority: newTaskPriority,
                        category: newTaskCategory,
                        deadline: newTaskDeadline || null,
                        createdAt: new Date().toISOString()
                    };
                    setTasks([...tasks, newTask]);
                    setNewTaskTitle('');
                    setNewTaskDeadline('');
                    setNewTaskPriority(PRIORITIES.MEDIUM);
                    setNewTaskCategory('Boshqa');
                    showNotification('✅ Vazifa qo\'shildi!');
                }
            };
            
            const deleteTask = (id) => {
                setTasks(tasks.filter(task => task.id !== id));
                showNotification('🗑️ Vazifa o\'chirildi');
            };
            
            const updateTaskStatus = (id, newStatus) => {
                setTasks(tasks.map(task => 
                    task.id === id ? { ...task, status: newStatus } : task
                ));
                if (newStatus === STATUSES.COMPLETED) {
                    showNotification('🎉 Vazifa bajarildi!');
                }
            };
            
            const handleDragStart = (e, task) => {
                setDraggedTask(task);
                e.dataTransfer.effectAllowed = 'move';
            };
            
            const handleDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            };
            
            const handleDrop = (e, newStatus) => {
                e.preventDefault();
                if (draggedTask) {
                    updateTaskStatus(draggedTask.id, newStatus);
                    setDraggedTask(null);
                }
            };
            
            const exportTasks = () => {
                const dataStr = JSON.stringify(tasks, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `vazifalar-${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                showNotification('📥 Vazifalar eksport qilindi');
            };
            
            const importTasks = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const importedTasks = JSON.parse(event.target.result);
                            setTasks(importedTasks);
                            showNotification('📤 Vazifalar import qilindi');
                        } catch (error) {
                            showNotification('❌ Fayl xato formatda', 'error');
                        }
                    };
                    reader.readAsText(file);
                }
            };
            
            const getStats = () => {
                return {
                    total: tasks.length,
                    pending: tasks.filter(t => t.status === STATUSES.PENDING).length,
                    inProgress: tasks.filter(t => t.status === STATUSES.IN_PROGRESS).length,
                    completed: tasks.filter(t => t.status === STATUSES.COMPLETED).length,
                    blocked: tasks.filter(t => t.status === STATUSES.BLOCKED).length,
                    overdue: tasks.filter(t => t.deadline && new Date(t.deadline) < new Date() && t.status !== STATUSES.COMPLETED).length
                };
            };
            
            const getProgress = () => {
                const total = tasks.length;
                const completed = tasks.filter(t => t.status === STATUSES.COMPLETED).length;
                return total > 0 ? Math.round((completed / total) * 100) : 0;
            };
            
            const filteredTasks = tasks.filter(task => {
                const statusMatch = filter === 'Hammasi' || task.status === filter;
                const categoryMatch = categoryFilter === 'Hammasi' || task.category === categoryFilter;
                const searchMatch = task.title.toLowerCase().includes(searchQuery.toLowerCase());
                return statusMatch && categoryMatch && searchMatch;
            });
            
            const stats = getStats();
            const progress = getProgress();
            
            return (
                <div className="min-h-screen p-4 md:p-8 transition-colors duration-300">
                    {/* Notification */}
                    {notification && (
                        <div className={`notification fixed top-4 right-4 px-6 py-4 rounded-lg shadow-lg z-50 ${
                            notification.type === 'error' ? 'bg-red-500' : 
                            notification.type === 'warning' ? 'bg-yellow-500' : 'bg-green-500'
                        } text-white font-medium`}>
                            {notification.message}
                        </div>
                    )}
                    
                    <div className="max-w-7xl mx-auto">
                        {/* Header */}
                        <div className="mb-8 flex justify-between items-start flex-wrap gap-4">
                            <div>
                                <h1 className="text-3xl md:text-4xl font-bold text-gray-800 mb-2">
                                    📋 Vazifalar Pro
                                </h1>
                                <p className="text-gray-600">
                                    Zamonaviy vazifalar boshqaruv tizimi
                                </p>
                            </div>
                            <div className="flex gap-2">
                                <button
                                    onClick={() => setDarkMode(!darkMode)}
                                    className="px-4 py-2 bg-gray-800 text-white rounded-lg hover:bg-gray-700 transition"
                                    title={darkMode ? 'Kunduzgi rejim' : 'Tungi rejim'}
                                >
                                    {darkMode ? '☀️' : '🌙'}
                                </button>
                                <button
                                    onClick={requestNotificationPermission}
                                    className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"
                                    title="Bildirishnomalar"
                                >
                                    🔔
                                </button>
                                <button
                                    onClick={exportTasks}
                                    className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition"
                                    title="Eksport"
                                >
                                    📥
                                </button>
                                <label className="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition cursor-pointer">
                                    📤
                                    <input type="file" accept=".json" onChange={importTasks} className="hidden" />
                                </label>
                            </div>
                        </div>
                        
                        {/* Progress Bar */}
                        <div className="bg-white rounded-lg shadow-md p-6 mb-6">
                            <div className="flex justify-between items-center mb-2">
                                <span className="text-gray-700 font-medium">Umumiy progress</span>
                                <span className="text-2xl font-bold text-blue-600">{progress}%</span>
                            </div>
                            <div className="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
                                <div 
                                    className="progress-bar h-full bg-gradient-to-r from-blue-500 to-green-500"
                                    style={{ width: `${progress}%` }}
                                />
                            </div>
                        </div>
                        
                        {/* Statistics */}
                        <div className="grid grid-cols-2 md:grid-cols-6 gap-4 mb-8">
                            <div className="stat-card bg-white rounded-lg shadow p-4 border-l-4 border-gray-500">
                                <div className="text-sm text-gray-600">Jami</div>
                                <div className="text-2xl font-bold text-gray-800">{stats.total}</div>
                            </div>
                            <div className="stat-card bg-white rounded-lg shadow p-4 border-l-4 border-blue-500">
                                <div className="text-sm text-blue-600">Kutilmoqda</div>
                                <div className="text-2xl font-bold text-blue-800">{stats.pending}</div>
                            </div>
                            <div className="stat-card bg-white rounded-lg shadow p-4 border-l-4 border-yellow-500">
                                <div className="text-sm text-yellow-600">Jarayonda</div>
                                <div className="text-2xl font-bold text-yellow-800">{stats.inProgress}</div>
                            </div>
                            <div className="stat-card bg-white rounded-lg shadow p-4 border-l-4 border-green-500">
                                <div className="text-sm text-green-600">Bajarildi</div>
                                <div className="text-2xl font-bold text-green-800">{stats.completed}</div>
                            </div>
                            <div className="stat-card bg-white rounded-lg shadow p-4 border-l-4 border-red-500">
                                <div className="text-sm text-red-600">To'silgan</div>
                                <div className="text-2xl font-bold text-red-800">{stats.blocked}</div>
                            </div>
                            <div className="stat-card bg-white rounded-lg shadow p-4 border-l-4 border-orange-500">
                                <div className="text-sm text-orange-600">Kechikkan</div>
                                <div className="text-2xl font-bold text-orange-800">{stats.overdue}</div>
                            </div>
                        </div>
                        
                        {/* Add Task */}
                        <div className="bg-white rounded-lg shadow-md p-6 mb-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3">
                                <input
                                    type="text"
                                    value={newTaskTitle}
                                    onChange={(e) => setNewTaskTitle(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && addTask()}
                                    placeholder="Yangi vazifa..."
                                    className="px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 lg:col-span-2"
                                />
                                <input
                                    type="datetime-local"
                                    value={newTaskDeadline}
                                    onChange={(e) => setNewTaskDeadline(e.target.value)}
                                    className="px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                />
                                <select
                                    value={newTaskPriority}
                                    onChange={(e) => setNewTaskPriority(e.target.value)}
                                    className="px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                >
                                    {Object.values(PRIORITIES).map(priority => (
                                        <option key={priority} value={priority}>{priority}</option>
                                    ))}
                                </select>
                                <select
                                    value={newTaskCategory}
                                    onChange={(e) => setNewTaskCategory(e.target.value)}
                                    className="px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                >
                                    {CATEGORIES.map(cat => (
                                        <option key={cat} value={cat}>{cat}</option>
                                    ))}
                                </select>
                            </div>
                            <button
                                onClick={addTask}
                                className="w-full mt-3 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium"
                            >
                                ➕ Vazifa qo'shish
                            </button>
                        </div>
                        
                        {/* Filters */}
                        <div className="bg-white rounded-lg shadow-md p-4 mb-6">
                            <div className="mb-4">
                                <input
                                    type="text"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    placeholder="🔍 Qidirish..."
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                />
                            </div>
                            <div className="flex gap-2 flex-wrap mb-3">
                                <span className="text-gray-600 font-medium">Status:</span>
                                <button
                                    onClick={() => setFilter('Hammasi')}
                                    className={`px-3 py-1 rounded-lg text-sm font-medium transition ${
                                        filter === 'Hammasi' ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                    }`}
                                >
                                    Hammasi
                                </button>
                                {Object.values(STATUSES).map(status => (
                                    <button
                                        key={status}
                                        onClick={() => setFilter(status)}
                                        className={`px-3 py-1 rounded-lg text-sm font-medium transition ${
                                            filter === status ? STATUS_BADGE_COLORS[status] + ' text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                        }`}
                                    >
                                        {status}
                                    </button>
                                ))}
                            </div>
                            <div className="flex gap-2 flex-wrap">
                                <span className="text-gray-600 font-medium">Kategoriya:</span>
                                <button
                                    onClick={() => setCategoryFilter('Hammasi')}
                                    className={`px-3 py-1 rounded-lg text-sm font-medium transition ${
                                        categoryFilter === 'Hammasi' ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                    }`}
                                >
                                    Hammasi
                                </button>
                                {CATEGORIES.map(cat => (
                                    <button
                                        key={cat}
                                        onClick={() => setCategoryFilter(cat)}
                                        className={`px-3 py-1 rounded-lg text-sm font-medium transition ${
                                            categoryFilter === cat ? 'bg-purple-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                        }`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>
                        </div>
                        
                        {/* Drag & Drop Zones */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                            {Object.values(STATUSES).map(status => (
                                <div
                                    key={status}
                                    onDragOver={handleDragOver}
                                    onDrop={(e) => handleDrop(e, status)}
                                    className={`p-4 rounded-lg border-2 border-dashed transition ${STATUS_COLORS[status]}`}
                                >
                                    <div className="text-center font-medium mb-2">{status}</div>
                                    <div className="text-2xl text-center">
                                        {tasks.filter(t => t.status === status).length}
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        {/* Tasks List */}
                        <div className="space-y-3">
                            {filteredTasks.length === 0 ? (
                                <div className="bg-white rounded-lg shadow-md p-12 text-center">
                                    <div className="text-6xl mb-4">📝</div>
                                    <p className="text-gray-500 text-lg">Vazifalar topilmadi</p>
                                </div>
                            ) : (
                                filteredTasks.sort((a, b) => {
                                    const priorityOrder = { 'Juda muhim': 4, 'Yuqori': 3, "O'rta": 2, 'Past': 1 };
                                    return priorityOrder[b.priority] - priorityOrder[a.priority];
                                }).map(task => {
                                    const isOverdue = task.deadline && new Date(task.deadline) < new Date() && task.status !== STATUSES.COMPLETED;
                                    return (
                                        <div
                                            key={task.id}
                                            draggable
                                            onDragStart={(e) => handleDragStart(e, task)}
                                            className={`task-card bg-white rounded-lg shadow-md p-4 border-l-4 ${STATUS_COLORS[task.status]} transition cursor-move ${
                                                isOverdue ? 'ring-2 ring-red-500' : ''
                                            }`}
                                        >
                                            <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                                <div className="flex-1">
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <h3 className="font-medium text-gray-800 text-lg">
                                                            {task.title}
                                                        </h3>
                                                        <span className={`px-2 py-1 rounded text-xs font-medium ${PRIORITY_COLORS[task.priority]}`}>
                                                            {task.priority}
                                                        </span>
                                                        <span className="px-2 py-1 rounded text-xs font-medium bg-purple-100 text-purple-600">
                                                            {task.category}
                                                        </span>
                                                    </div>
                                                    <div className="flex items-center gap-4 text-sm text-gray-500">
                                                        <span>📅 {new Date(task.createdAt).toLocaleDateString('uz-UZ')}</span>
                                                        {task.deadline && (
                                                            <span className={isOverdue ? 'text-red-600 font-bold' : ''}>
                                                                ⏰ {new Date(task.deadline).toLocaleString('uz-UZ', { 
                                                                    day: '2-digit', 
                                                                    month: '2-digit',
                                                                    hour: '2-digit',
                                                                    minute: '2-digit'
                                                                })}
                                                                {isOverdue && ' (Kechikkan!)'}
                                                            </span>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="flex gap-2 items-center flex-wrap">
                                                    <select
                                                        value={task.status}
                                                        onChange={(e) => updateTaskStatus(task.id, e.target.value)}
                                                        className={`px-3 py-2 rounded-lg font-medium border-2 cursor-pointer ${STATUS_COLORS[task.status]}`}
                                                    >
                                                        {Object.values(STATUSES).map(status => (
                                                            <option key={status} value={status}>{status}</option>
                                                        ))}
                                                    </select>
                                                    <button
                                                        onClick={() => deleteTask(task.id)}
                                                        className="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition font-medium"
                                                    >
                                                        🗑️
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    </div>
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TaskMonitorPro />);
    </script>
</body>
</html>
